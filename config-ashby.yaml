# config-ashby.yaml
# Ashby ATS companies — polled by poller.py alongside config.yaml.
# Add a new company by adding a new block — no code changes needed.
#
# HOW TO FIND THE SLUG:
#   Go to the company's job board URL: https://jobs.ashbyhq.com/{SLUG}
#   If jobs load, the slug is correct. Add it here.
#
# LOCATION NOTES:
#   Ashby provides richer location data than Greenhouse:
#   - primary location string ("San Francisco, CA")
#   - secondaryLocations list (multiple offices)
#   - isRemote flag and workplaceType ("Remote" | "Hybrid" | "OnSite")
#   The scraper combines all of these into one string for filtering.
#   "Remote" in your locations list matches any role where isRemote=True.
#
# SLUG VERIFICATION STATUS:
#   ✅ = confirmed by browser check
#   ❓ = inferred from company name, needs browser verification
#       Open https://jobs.ashbyhq.com/SLUG to confirm before enabling.

companies:

  # ════════════════════════════════════════════════════════════
  #  VERIFIED SLUGS — confirmed on jobs.ashbyhq.com
  # ════════════════════════════════════════════════════════════

  - name: Cohere
    ats: ashby
    slug: cohere                    # ✅ jobs.ashbyhq.com/cohere
    keywords:
      - software engineer
      - software developer
      - backend engineer
      - full stack
      - python developer
      - devops engineer
      - cloud engineer
      - ml engineer
      - ai engineer
    locations:
      - United States
      - USA
      - San Francisco
      - New York
      - Remote
    max_age_days: 1
    active: true   # enable after live test confirms slug + location strings

