# config/config-workable.yaml
# Workable ATS companies.
# Loaded automatically by poller.py.
#
# HOW TO FIND THE SLUG:
#   Go to https://apply.workable.com/{SLUG}
#   If jobs load, the slug is correct.
#
# LOCATION NOTES — Workable is MUCH cleaner than Greenhouse:
#   Location is a structured object with country_code, city, region separately.
#   Use "US" in locations list to match country_code == "US" directly.
#   Use "Remote" to match telecommuting == true or remote == true.
#   No substring guessing needed like with Greenhouse.
#
#   Example: locations: [US, Remote]
#     → matches all US office roles AND all remote roles
#
# DATE NOTES:
#   Workable returns created_at as ISO 8601 string.
#   This is the actual job creation date — accurate for freshness filtering.
#
# ✅ = slug confirmed   ❓ = needs browser verification at apply.workable.com/SLUG

companies:

  # ════════════════════════════════════════════════════════════
  #  CONFIRMED — verified at apply.workable.com
  # ════════════════════════════════════════════════════════════

  - name: Typeform
    ats: workable
    slug: typeform                  # ✅ apply.workable.com/typeform
    keywords: [software engineer, software developer, python developer, full stack, backend engineer, devops engineer, cloud engineer, ai engineer, ml engineer]
    locations: [US, Remote]
    max_age_days: 1
    active: false   # enable after live test confirms slug + data

  # ════════════════════════════════════════════════════════════
  #  UNVERIFIED — check slug before enabling
  #  Open https://apply.workable.com/SLUG in browser
  # ════════════════════════════════════════════════════════════

