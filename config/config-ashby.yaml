# config/config-ashby.yaml
# Ashby ATS companies.
# Loaded automatically by poller.py.
#
# HOW TO FIND THE SLUG:
#   Go to https://jobs.ashbyhq.com/{SLUG} — if jobs load, slug is correct.
#
# LOCATION NOTES:
#   Ashby provides primary location, secondaryLocations list, isRemote flag,
#   and workplaceType. The scraper combines all into one string.
#   "Remote" matches any role where isRemote=True.
#
# ✅ = slug confirmed   ❓ = needs browser verification

companies:

  - name: Cohere
    ats: ashby
    slug: cohere                    # ✅ jobs.ashbyhq.com/cohere
    keywords:
      - software engineer
      - software developer
      - backend engineer
      - full stack
      - python developer
      - devops engineer
      - cloud engineer
      - ml engineer
      - ai engineer
    locations:
      - United States
      - USA
      - San Francisco
      - New York
      - Remote
    max_age_days: 1
    active: true

