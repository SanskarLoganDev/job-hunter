# config/config-lever.yaml
# Lever ATS companies.
# Loaded automatically by poller.py.
#
# HOW TO FIND THE SLUG:
#   Go to https://jobs.lever.co/{SLUG} — if jobs load, slug is correct.
#   Also try: curl https://api.lever.co/v0/postings/{SLUG}?mode=json
#   If you get a JSON array back, it works.
#
# LOCATION NOTES:
#   Lever returns location inside categories.location e.g. "San Francisco, CA"
#   Some roles also have workplaceType: "Remote" or "Hybrid" at the top level.
#   The scraper appends "; Remote" to the location string for remote roles
#   so "Remote" in your locations list correctly matches them.
#
# DATE NOTES:
#   Lever createdAt is Unix timestamp in MILLISECONDS — the scraper handles this.
#   This is the actual posting creation date — accurate for freshness filtering.
#
# ✅ = slug confirmed from live jobs.lever.co URL

companies:

  - name: Voleon Group
    ats: lever
    slug: voleon                    # ✅ jobs.lever.co/voleon
    keywords: [software engineer, software developer, python developer, full stack, backend engineer, devops engineer, cloud engineer, ai engineer, ml engineer]
    locations: [San Francisco, Berkeley, United States, Remote]
    max_age_days: 1
    active: true

