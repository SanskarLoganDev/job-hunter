  # fine (the LinkedInQA candidate was not used/tested, discarded as likely
  # a staging board). The CSV batch below also lists a "linkedin" LinkedIn
  # entry (guessed slug "Linkedin") — intentionally skipped as a likely
  # duplicate of this already-verified LinkedIn3 entry.
  - name: LinkedIn
    ats: smartrecruiters
    slug: LinkedIn3
    keywords: [software engineer, software developer, python developer, full stack, backend engineer, devops engineer, cloud engineer, ai engineer, ml engineer, forward deployed engineer, application developer, web developer]
    locations: [United States, Remote]
    max_age_days: 1
    detail_fetch_limit: 30
    active: true

  # ════════════════════════════════════════════════════════
