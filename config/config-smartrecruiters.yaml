# config/config-smartrecruiters.yaml
# SmartRecruiters ATS companies.
# Loaded automatically by poller.py.
#
# HOW TO FIND THE companyIdentifier (the "slug" field below):
#   companyIdentifier is NOT always the obvious brand name.
#   Verify via: https://careers.smartrecruiters.com/{identifier}
#           or: https://jobs.smartrecruiters.com/{identifier}
#   Example: Bosch's real identifier is "BoschGroup", not "bosch" — guessing
#   "bosch" returns totalFound: 0 (a valid empty response, not an error).
#
#   IMPORTANT — search snippets are NOT sufficient verification. A search
#   result showing a careers.smartrecruiters.com/{slug} URL can still be a
#   stale/defunct instance that redirects to the generic SmartRecruiters
#   homepage when actually opened (this happened with an early "Skechers1"
#   guess — Skechers' real, current career site turned out to be on Workday,
#   not SmartRecruiters at all). ALWAYS open the URL directly in a browser
#   and confirm real, current job listings load before marking verified.
#
# LOCATION NOTES:
#   SmartRecruiters location is structured (city/region/country/remote/hybrid)
#   — scraper combines into one string, same approach as Ashby's _build_location().

companies:

  # ════════════════════════════════════════════════════════
  #  VERIFIED — confirmed by opening the URL directly in browser
  #  and seeing real, current job listings (not just a search hit)
  # ════════════════════════════════════════════════════════

  # Verified 2026-06-30: https://api.smartrecruiters.com/v1/companies/BoschGroup/postings/
  # returned totalFound: 4619. Large hardware/automotive/industrial employer —
  # relevant for both standard SWE keywords and embedded keywords.
  - name: Bosch Group
    ats: smartrecruiters
    slug: BoschGroup
    keywords: [software engineer, software developer, python developer, full stack, backend engineer, devops engineer, cloud engineer, ai engineer, ml engineer, forward deployed engineer, application developer, web developer, embedded software engineer, iot engineer, embedded systems engineer]
    locations: [United States, Remote]
    max_age_days: 1
    detail_fetch_limit: 30
    active: true

  # Verified 2026-06-30 by user — careers.smartrecruiters.com/Visa loads real jobs.
  - name: Visa
    ats: smartrecruiters
    slug: Visa
    keywords: [software engineer, software developer, python developer, full stack, backend engineer, devops engineer, cloud engineer, ai engineer, ml engineer, forward deployed engineer, application developer, web developer]
    locations: [United States, Remote]
    max_age_days: 1
    detail_fetch_limit: 30
    active: true

