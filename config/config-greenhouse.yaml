# config/config-greenhouse.yaml
# Greenhouse companies only.
# Amazon → config-amazon.yaml | Ashby → config-ashby.yaml | Lever → config-lever.yaml
# Loaded automatically by poller.py alongside all other config-*.yaml files.
#
# LOCATION NOTES (learned from live API output):
#   Anthropic : "San Francisco, CA | New York City, NY" — pipe + semicolon concat
#   Datadog   : "New York, New York, USA"               — USA suffix on all US roles
#   DoorDash  : "San Francisco, CA; Seattle, WA"        — semicolon-separated
#   Figma     : "San Francisco, CA • New York, NY • United States" — bullet-separated
#   Most others: standard "City, ST" or "City, State, USA" format
#
# SLUG SOURCE: https://boards.greenhouse.io/{slug}
# All slugs verified from ATS_Company_Directory.xlsx.
#
# KEYWORDS: every company includes "ai engineer" — it's the hottest role right now.

# Shared keyword block (same for every company — copy-paste this):
