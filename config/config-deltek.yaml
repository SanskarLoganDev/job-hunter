# config/config-deltek.yaml
# Deltek careers scraper.
# Loaded automatically by poller.py.
#
# API: https://jobsapi-internal.m-cloud.io/api/job
# Tenant: Organization=2458 (from cws_opts.org in careers.deltek.com page HTML)
# ATS backend: Kenexa/BrassRing
#
# CATEGORIES SCRAPED (two separate API calls, deduped by job ID):
#   - Information Technology
#   - Software Development/Design
# These match the filters on the target URL:
#   https://careers.deltek.com/?education=United%20States
#     &category[]=Information%20Technology
#     &category[]=Software%20Development%2FDesign
#
# LOCATION: API-side filter to education=United States — all results are US.
# The `locations` field below is kept for future flexibility but the scraper
# does not apply a secondary location filter (already US-only from the API).
#
# NO SLUG NEEDED: Deltek is a single fixed tenant. The scraper hardcodes
# org=2458, unlike GH/Ashby/Lever/SmartRecruiters which are multi-tenant.

companies:

  - name: Deltek
    ats: deltek
    keywords:
      - software engineer
      - software developer
      - python developer
      - full stack
      - backend engineer
      - devops engineer
      - cloud engineer
      - ai engineer
      - ml engineer
      - application developer
      - web developer
      - data engineer
      - systems engineer
    max_age_days: 2
    active: true
