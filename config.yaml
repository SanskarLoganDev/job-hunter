# config.yaml
# One entry per company. poller.py reads this on every run.
# Add a new company by adding a new block — no code changes needed.
#
# Fields:
#   name              : display name (used in emails + logs)
#   ats               : which scraper to use — amazon | greenhouse | lever | workday
#   keywords          : role title must contain AT LEAST ONE of these (case-insensitive)
#   locations         : job location must contain AT LEAST ONE of these (case-insensitive)
#                       leave empty ([]) to accept all locations
#   max_age_days      : ignore jobs older than this many days (0 = no filter)
#   detail_fetch_limit: (amazon/workday only) max detail pages to fetch for dates
#   active            : set to false to pause without deleting
#   slug              : (greenhouse/lever only) the company slug in the ATS URL

companies:

  - name: Amazon
    ats: amazon
    keywords:
      - software engineer
      - software developer
      - python developer
      - full stack
      - backend engineer
      - devops engineer
      - cloud engineer
      - cloud architect
      - ai engineer
      - ml engineer
    locations:
      - United States
      - US
      - USA
      - Remote
      - Seattle
      - New York
      - Austin
      - San Francisco
      - Boston
      - Chicago
      - Dallas
      - Atlanta
      - Arlington
      - Bellevue
      - Redmond
      - Sunnyvale
      - Santa Clara
      - Washington
      - Virginia
    max_age_days: 2
    detail_fetch_limit: 30
    active: true

