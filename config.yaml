# config.yaml
# One entry per company. poller.py reads this on every run.
#
# GREENHOUSE COMPANIES: enable one at a time after live testing confirms correctness.
# Run to see raw location strings for any company:
#   $env:RUN_LIVE_TESTS=1; .venv\Scripts\python -m pytest tests/test_greenhouse.py::TestLive::test_print_actual_location_strings -v -s
#
# LOCATION FILTER NOTES (learned from live test output):
#   Anthropic : concatenates cities with | and ; e.g. "San Francisco, CA | New York City, NY"
#               Use city names + "United States" to catch remote roles
#   Datadog   : "New York, New York, USA" — "USA" suffix on all US roles
#   DoorDash  : "San Francisco, CA; Seattle, WA" semicolon-separated
#               Remote roles say "United States - Remote"
#   Figma     : "San Francisco, CA • New York, NY • United States"
#               "United States" appears in all multi-location US strings

companies:

  # ════════════════════════════════════════════════════════════
  #  AMAZON — tested and active
  # ════════════════════════════════════════════════════════════
  - name: Amazon
    ats: amazon
    keywords:
      - software engineer
      - software developer
      - python developer
      - full stack
      - backend engineer
      - devops engineer
      - cloud engineer
      - cloud architect
      - ai engineer
      - application developer
    locations:
      - United States
      - US
      - Remote
      - Seattle
      - New York
      - Austin
      - San Francisco
      - Boston
      - Chicago
      - Dallas
      - Atlanta
      - Arlington
      - Bellevue
      - Redmond
      - Sunnyvale
      - Santa Clara
      - Washington
      - Virginia
    max_age_days: 2
    detail_fetch_limit: 30
    active: true

  # ════════════════════════════════════════════════════════════
  #  GREENHOUSE — enable one at a time after live tests pass
  # ════════════════════════════════════════════════════════════

  - name: Anthropic
    ats: greenhouse
    slug: anthropic
    keywords:
      - software engineer
      - software developer
      - python developer
      - full stack
      - backend engineer
      - devops engineer
      - cloud engineer
      - ai engineer
      - ml engineer
    locations:
      # Anthropic concatenates cities: "San Francisco, CA | New York City, NY | Seattle, WA"
      # Substring matching catches all combinations
      - San Francisco
      - New York City
      - Seattle
      - Washington, DC
      - Boston
      - United States        # catches "Remote-Friendly, United States"
      - Remote-Friendly      # catches all remote variants
    max_age_days: 1
    active: true   # flip to true after Step 4 testing

  - name: Datadog
    ats: greenhouse
    slug: datadog
    keywords:
      - software engineer
      - software developer
      - python developer
      - full stack
      - backend engineer
      - devops engineer
      - cloud engineer
      - ai engineer
    locations:
      # Datadog format: "New York, New York, USA" — USA suffix on all US roles
      - USA             # single term catches every US location
      - United States   # fallback for remote roles
      - Remote
    max_age_days: 1
    active: false

  - name: Figma
    ats: greenhouse
    slug: figma
    keywords:
      - software engineer
      - software developer
      - full stack
      - backend engineer
      - devops engineer
      - cloud engineer
    locations:
      # Figma format: "San Francisco, CA • New York, NY • United States"
      # "United States" appears in all multi-location US strings
      - United States   # catches all US multi-location strings
      - San Francisco   # catches SF-only roles
      - New York        # catches NY-only roles
      - Remote
    max_age_days: 1
    active: false

  - name: DoorDash
    ats: greenhouse
